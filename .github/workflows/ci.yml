# Retrosync Media Group — CI/CD
name: Full Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BTTC_DEV_MODE:    "1"
  LEDGER_DEV_MODE:  "1"
  DDEX_DEV_MODE:    "1"
  WIKIDATA_DISABLED: "1"
  ZERO_TRUST_DISABLED: "1"
  RUST_LOG:         "info"

jobs:
  rust-tests:
    name: Rust (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  foundry-tests:
    name: Foundry (forge test + fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: |
          cd contracts
          forge install OpenZeppelin/openzeppelin-contracts --no-commit || true
          forge test --fuzz-runs 2000 -v
      - run: |
          cd contracts
          forge coverage

  wasm-build:
    name: WASM Frontend (trunk build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install trunk --locked
      - run: |
          cd apps/wasm-frontend
          trunk build --release

  nix-flake-check:
    name: Nix (flake check --all-systems)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v15
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: retrosync
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: nix flake check
        run: nix flake check --all-systems

  nix-build:
    name: Nix (build backend + frontend packages)
    runs-on: ubuntu-latest
    needs: nix-flake-check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v15
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: retrosync
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: nix build backend
        run: nix build .#backend
      - name: nix build frontend
        run: nix build .#frontend

  compliance-check:
    name: Compliance (DMCA + GDPR + KYC + Moderation endpoints)
    runs-on: ubuntu-latest
    needs: rust-tests
    env:
      # CI-only secret — not used in production.
      # WALLET_AUTH_DEV_BYPASS=1 allows the test wallet flow without a real
      # ECDSA signature. Never set these in a production deployment.
      JWT_SECRET: "ci-test-only-not-for-production"
      WALLET_AUTH_DEV_BYPASS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin backend
      - name: Start backend
        run: |
          BTTC_DEV_MODE=1 LEDGER_DEV_MODE=1 DDEX_DEV_MODE=1 \
          ZERO_TRUST_DISABLED=1 cargo run --bin backend &
          sleep 5
      - name: Health check
        run: curl -sf http://localhost:8443/health
      - name: DMCA endpoint
        run: |
          curl -sf -X POST http://localhost:8443/api/takedown \
            -H 'Content-Type: application/json' \
            -d '{"isrc":"GB-ABC-24-00001","claimant_name":"Test","claimant_email":"test@test.com","work_description":"Test","infringing_url":"http://test.com","good_faith":true,"accuracy":true}'
      - name: Obtain CI test JWT
        run: |
          ADDR="0x0000000000000000000000000000000000000001"
          CHALLENGE=$(curl -sf http://localhost:8443/api/auth/challenge/$ADDR)
          CID=$(echo "$CHALLENGE" | python3 -c "import sys,json; print(json.load(sys.stdin)['challenge_id'])")
          RESP=$(curl -sf -X POST http://localhost:8443/api/auth/verify \
            -H 'Content-Type: application/json' \
            -d "{\"challenge_id\":\"$CID\",\"address\":\"$ADDR\",\"signature\":\"0x$(python3 -c 'print(\"00\"*65)')\"}")
          echo "CI_JWT=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")" >> $GITHUB_ENV
      - name: Privacy consent endpoint
        run: |
          curl -sf -X POST http://localhost:8443/api/privacy/consent \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $CI_JWT" \
            -d '{"user_id":"0x0000000000000000000000000000000000000001","purpose":"Analytics","granted":true,"ip_hash":"abc123","version":"1.0"}'

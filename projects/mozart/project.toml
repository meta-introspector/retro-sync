[project]
name        = "mozart"
title       = "W.A. Mozart — Complete Works"
date        = "1762-1791"
license     = "PD"
description = "From child prodigy to Requiem: symphonies, operas, concertos, chamber music"

[theme]
style       = "viennese-classical"
palette     = ["#F0E6D2", "#4169E1", "#FFD700", "#2C2C2C", "#DC143C"]
motifs      = ["treble_clef", "vienna_skyline", "manuscript_page", "piano_keys", "opera_mask"]

[sources.wikipedia]
articles    = ["Wolfgang_Amadeus_Mozart", "List_of_compositions_by_Wolfgang_Amadeus_Mozart", "Requiem_(Mozart)"]
lang        = "en"

[sources.wikidata]
qid         = "Q254"

[sources.midi]
dir         = "datasets/midi-classical-data"
pattern     = "mozart-*.mid"

[tiles]
count       = 71
pattern     = "{:02}.png"
width       = 512
height      = 512

[segments]
names       = ["midi_bundle", "metadata", "blade_data", "wikipedia", "wikidata", "erdfa"]
